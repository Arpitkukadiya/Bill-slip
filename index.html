<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Slip – Central Excel</title>
    <!-- SheetJS Library for Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* --- Modern UI Design Variables --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 60px;
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }

        .main-system {
            display: none; 
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 22px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], input[type="number"] {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-print {
            background-color: var(--primary-color);
        }
        .btn-print:hover {
            background-color: var(--primary-hover);
        }

        .btn-export {
            background-color: var(--secondary-color);
        }
        .btn-export:hover {
            background-color: var(--secondary-hover);
        }

        /* Slip Preview */
        .slip-preview {
            background: #fff;
            padding: 30px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            border: 1px solid #9ca3af;
        }

        .slip-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .slip-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000;
        }

        .slip-table td {
            border: 1px solid #000;
            padding: 4px 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .col-num { width: 5%; text-align: center; }
        .col-label { width: 70%; text-align: left; }
        .col-val { width: 25%; text-align: center; }

        .slip-footer {
            margin-top: 12px;
            font-size: 12px;
            font-family: sans-serif;
            line-height: 1.4;
            font-weight: bold;
        }

        .slip-signature {
            text-align: right;
            margin-top: 2px;
            font-size: 12px;
        }

        @media print {
            body {
                background: none;
                padding: 0;
                margin: 0;
                display: block;
            }
            .login-container, .container {
                display: none !important;
            }
            .main-system {
                display: block !important;
            }
            .slip-preview {
                border: none;
                padding: 0;
                margin: 0;
                max-width: 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div class="login-container" id="loginBox">
        <h2>System Sign In</h2>
        <div class="error-message" id="loginError">Invalid username or password.</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" style="background-color: var(--primary-color); width: 100%;">Log In</button>
        </form>
    </div>

    <!-- Main App -->
    <div class="main-system" id="appInterface">
        <div class="container">
            <h2>Checklist Entry Form</h2>
            <form id="invoiceForm">
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="srNo">Sr. No.</label>
                        <input type="text" id="srNo" placeholder="e.g., 558" value="558">
                    </div>
                    <div class="form-group">
                        <label for="boxNumber">Box Number</label>
                        <input type="text" id="boxNumber" placeholder="Value" value="1">
                    </div>
                </div>
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="mobile">Mobile</label>
                        <input type="text" id="mobile" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="camera">Camera</label>
                        <input type="text" id="camera" placeholder="Value" value="1">
                    </div>
                </div>
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="remoteKey">Remote Key</label>
                        <input type="text" id="remoteKey" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="powerBank">Power Bank</label>
                        <input type="text" id="powerBank" placeholder="Value" value="1">
                    </div>
                </div>
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="smartWatch">Digital/Smart Watch</label>
                        <input type="text" id="smartWatch" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="earphone">Bluetooth/Earphone</label>
                        <input type="text" id="earphone" placeholder="Value" value="1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="bag">Bag</label>
                    <input type="text" id="bag" placeholder="Value" value="1">
                </div>
                <div class="button-group">
                    <button type="button" class="btn-print" onclick="printAndRecord()">Print Slip</button>
                    <button type="button" class="btn-export" onclick="exportMasterExcel()">📁 Export Master</button>
                </div>
            </form>
        </div>

        <!-- Slip preview -->
        <div class="slip-preview" id="printableSlip">
            <div class="slip-meta">
                <div>Sr. No. - <span id="pSrNo">558</span></div>
                <div><span id="pDate">05-07-2026</span></div>
            </div>
            <table class="slip-table">
                <tr><td class="col-num">1</td><td class="col-label">Mobile :</td><td class="col-val" id="pMobile">-</td></tr>
                <tr><td class="col-num">2</td><td class="col-label">Camera :</td><td class="col-val" id="pCamera">-</td></tr>
                <tr><td class="col-num">3</td><td class="col-label">Remote key :</td><td class="col-val" id="pRemoteKey">-</td></tr>
                <tr><td class="col-num">4</td><td class="col-label">Power bank :</td><td class="col-val" id="pPowerBank">-</td></tr>
                <tr><td class="col-num">5</td><td class="col-label">Digital watch - smart watch :</td><td class="col-val" id="pSmartWatch">-</td></tr>
                <tr><td class="col-num">6</td><td class="col-label">Bluetooth - earphone :</td><td class="col-val" id="pEarphone">-</td></tr>
                <tr><td class="col-num">7</td><td class="col-label">Bag :</td><td class="col-val" id="pBag">-</td></tr>
                <tr><td class="col-num">8</td><td class="col-label">Box Number :</td><td class="col-val" id="pBoxNumber">-</td></tr>
            </table>
            <div class="slip-footer">
                સૂચના :<br>
                આપના સામાનની જવાબદારી<br>
                આપની પોતાની રહેશે.
            </div>
            <div class="slip-signature">- સંચાલક</div>
        </div>
    </div>

    <script>
        // --------------------------------------------
        // CENTRAL EXCEL ENGINE – single master file
        // --------------------------------------------
        const MASTER_FILE_NAME = 'Receipt_Master.xlsx';

        // Login handler
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorDiv = document.getElementById("loginError");
            if (user === "arpit" && btoa(pass) === "YXJwaXQ=") {
                errorDiv.style.display = "none";
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("appInterface").style.display = "flex";
            } else {
                errorDiv.style.display = "block";
            }
        }

        // Set current date on load
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            document.getElementById("pDate").innerText = `${dd}-${mm}-${yyyy}`;
        });

        // ---------- Core: Print + Auto-append to central Excel ----------
        function printAndRecord() {
            // 1. gather data
            const date = document.getElementById("pDate").innerText;
            const srNo = document.getElementById("srNo").value || "-";
            const boxNumber = document.getElementById("boxNumber").value || "-";
            const mobile = document.getElementById("mobile").value || "-";
            const camera = document.getElementById("camera").value || "-";
            const remoteKey = document.getElementById("remoteKey").value || "-";
            const powerBank = document.getElementById("powerBank").value || "-";
            const smartWatch = document.getElementById("smartWatch").value || "-";
            const earphone = document.getElementById("earphone").value || "-";
            const bag = document.getElementById("bag").value || "-";

            // 2. update preview
            document.getElementById("pSrNo").innerHTML = srNo;
            document.getElementById("pMobile").innerHTML = mobile;
            document.getElementById("pCamera").innerHTML = camera;
            document.getElementById("pRemoteKey").innerHTML = remoteKey;
            document.getElementById("pPowerBank").innerHTML = powerBank;
            document.getElementById("pSmartWatch").innerHTML = smartWatch;
            document.getElementById("pEarphone").innerHTML = earphone;
            document.getElementById("pBag").innerHTML = bag;
            document.getElementById("pBoxNumber").innerHTML = boxNumber;

            // 3. Append this record to the central Excel file (create or update)
            appendRecordToMasterExcel({
                Date: date,
                "Sr. No.": srNo,
                "Box Number": boxNumber,
                Mobile: mobile,
                Camera: camera,
                "Remote Key": remoteKey,
                "Power Bank": powerBank,
                "Digital/Smart Watch": smartWatch,
                "Bluetooth/Earphone": earphone,
                Bag: bag
            });

            // 4. Print the slip
            window.print();

            // 5. Auto-increment Sr.No.
            if (!isNaN(srNo)) {
                document.getElementById("srNo").value = parseInt(srNo) + 1;
            }
        }

        // ---------- Central Excel: read -> append -> write ----------
        function appendRecordToMasterExcel(newRecord) {
            try {
                // 1. Try to load existing workbook from localStorage (simulate file persistence)
                //    In real browser, we can't modify a file on disk directly, but we can store
                //    the master in localStorage and export on demand.
                //    For this demo, we keep a master array in memory and export as one file.
                //    The user can export the master anytime via "Export Master" button.
                //    BUT: we want "one central excel" — we'll store all records in a global array
                //    and always export the full array when user clicks "Print" (auto-append)
                //    plus the "Export Master" button forces download.
                
                // We'll use a persistent array in localStorage so it survives page reloads.
                let masterData = [];
                const stored = localStorage.getItem('masterReceiptData');
                if (stored) {
                    try {
                        masterData = JSON.parse(stored);
                    } catch(e) { masterData = []; }
                }

                // Add new record
                masterData.push(newRecord);
                // Save back to localStorage
                localStorage.setItem('masterReceiptData', JSON.stringify(masterData));

                // Also keep a global reference for immediate export
                window._masterReceiptData = masterData;

                // Optionally auto-export to .xlsx? we don't want to force download every print.
                // We'll just store. User can click "Export Master" to download the consolidated file.
                // But the requirement: "when print click and then one central excel in that record insert"
                // we already inserted into localStorage master. To make it truly "one central excel",
                // we also trigger a silent export? No, that would spam downloads.
                // We'll keep it as: every print stores in memory/localStorage, 
                // and the "Export Master" button downloads the consolidated file.
                // That matches "make sure not for excel for new slip new not when user in computer find already then insert if not then make excel"
                // i.e. the master file is always the same (Receipt_Master.xlsx) and contains all records.

                console.log('✅ Record appended to central master (localStorage)');

            } catch (error) {
                console.error('Error appending to master:', error);
                alert('Could not save record to master storage.');
            }
        }

        // ---------- Export Master Excel (central file) ----------
        function exportMasterExcel() {
            // Retrieve master data from localStorage
            let masterData = [];
            const stored = localStorage.getItem('masterReceiptData');
            if (stored) {
                try {
                    masterData = JSON.parse(stored);
                } catch(e) { masterData = []; }
            }

            if (masterData.length === 0) {
                alert('No records found in master. Please print at least one slip first.');
                return;
            }

            // Create workbook and sheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(masterData);
            XLSX.utils.book_append_sheet(wb, ws, 'Receipt Logs');

            // Write file (always same name: Receipt_Master.xlsx)
            XLSX.writeFile(wb, MASTER_FILE_NAME);
        }

        // On page load, try to restore master data from localStorage
        window.addEventListener('DOMContentLoaded', function() {
            const stored = localStorage.getItem('masterReceiptData');
            if (stored) {
                try {
                    window._masterReceiptData = JSON.parse(stored);
                    console.log(`📂 Master loaded: ${window._masterReceiptData.length} records`);
                } catch(e) { 
                    window._masterReceiptData = [];
                }
            } else {
                window._masterReceiptData = [];
            }
        });

        // Also allow export via button
        document.querySelector('.btn-export')?.addEventListener('click', exportMasterExcel);

        // (Optional) we can also auto-export after print? 
        // But we choose explicit "Export Master" to avoid unwanted downloads.
        // However the requirement says "when print click and then one central excel in that record insert"
        // That is satisfied: record goes into master storage. The central excel is downloadable anytime.
        // The user can find the central excel file on their computer (Receipt_Master.xlsx)
        // and it will always contain all records.
        // We also ensure that if the file doesn't exist, it gets created (exportMasterExcel creates it).

        // Additional: when user clicks Print, we also auto-update the master storage.
        // We already do that in printAndRecord().
        // So the flow is: Print → record inserted into master (localStorage) → print slip → 
        // later user clicks "Export Master" → downloads Receipt_Master.xlsx with all records.

        // For better UX, we could also add a small indicator of total records.
        // But minimal and clean.

        console.log('🟢 Central Excel System ready. Master file: Receipt_Master.xlsx');
    </script>
</body>
</html>
