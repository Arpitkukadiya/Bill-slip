
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Receipt Slip System</title>
    <style>
        /* --- Modern Styling Variables --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- Login Screen Styling --- */
        .login-container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 60px;
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }

        /* --- Main System Styling (Hidden until login) --- */
        .main-system {
            display: none; 
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], input[type="number"] {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* --- Strict Slip Box replication from 1783228672657.jpeg --- */
        .slip-preview {
            background: #fff;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            color: #000;
            font-family: Arial, sans-serif;
        }

        .slip-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .slip-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .slip-table td {
            border: 1.5px solid #000;
            padding: 4px 8px;
            font-size: 14px;
        }

        /* Fixed structural sizing match */
        .slip-table td:nth-child(1) { width: 5%; text-align: center; }
        .slip-table td:nth-child(2) { width: 80%; text-align: left; }
        .slip-table td:nth-child(3) { width: 15%; text-align: center; font-weight: bold; }

        .slip-footer {
            font-size: 12px;
            line-height: 1.6;
            margin-top: 15px;
        }
        
        .slip-footer .notice-heading {
            font-weight: bold;
        }

        .slip-footer .manager-signature {
            text-align: right;
            margin-top: 5px;
            padding-right: 20px;
        }

        /* --- Print Specific Styling --- */
        @media print {
            body {
                background: none;
                padding: 0;
                margin: 0;
            }
            .login-container, .container {
                display: none !important;
            }
            .main-system {
                display: block !important;
            }
            .slip-preview {
                border: none;
                max-width: 100%;
                width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Static Login Module Section -->
    <div class="login-container" id="loginBox">
        <h2>System Sign In</h2>
        <div class="error-message" id="loginError">Invalid username or password.</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
    </div>

    <!-- Main Dynamic Application -->
    <div class="main-system" id="appInterface">
        <div class="container">
            <h2>Item Checklist Form</h2>
            <form id="invoiceForm">
                <div class="form-group">
                    <label for="customer">Customer Name</label>
                    <input type="text" id="customer" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="boxNumber">Sr. No. / Box Number</label>
                    <input type="number" id="boxNumber" placeholder="e.g., 558" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile Quantity</label>
                    <input type="text" id="mobile" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="camera">Camera Quantity</label>
                    <input type="text" id="camera" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="remoteKey">Remote Key Quantity</label>
                    <input type="text" id="remoteKey" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="powerBank">Power Bank Quantity</label>
                    <input type="text" id="powerBank" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="smartWatch">Digital Watch - Smart Watch Quantity</label>
                    <input type="text" id="smartWatch" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="earphone">Bluetooth - Earphone Quantity</label>
                    <input type="text" id="earphone" placeholder="e.g., 1">
                </div>
                <div class="form-group">
                    <label for="bag">Bag Quantity</label>
                    <input type="text" id="bag" placeholder="e.g., 1">
                </div>

                <button type="button" onclick="printInvoice()">Print Receipt Slip</button>
            </form>
        </div>

        <!-- Live Layout Match to Image 1783228672657.jpeg -->
        <div class="slip-preview" id="printableSlip">
            <div class="slip-header">
                <div>Sr. No. - <span id="cboxNumber">558</span></div>
                <div id="slipDate">05-07-2026</div>
            </div>
            
            <table class="slip-table">
                <tr><td>1</td><td>Mobile :</td><td id="cmobile">1</td></tr>
                <tr><td>2</td><td>Camera :</td><td id="ccamera">1</td></tr>
                <tr><td>3</td><td>Remote key :</td><td id="cremoteKey">1</td></tr>
                <tr><td>4</td><td>Power bank :</td><td id="cpowerBank">1</td></tr>
                <tr><td>5</td><td>Digital watch - smart watch :</td><td id="csmartWatch">1</td></tr>
                <tr><td>6</td><td>Bluetooth - earphone :</td><td id="cearphone">1</td></tr>
                <tr><td>7</td><td>Bag :</td><td id="cbag">1</td></tr>
                <tr><td>8</td><td>Box Number :</td><td id="cboxNumberRow">1</td></tr>
            </table>

            <div class="slip-footer">
                <div class="notice-heading">સૂચના :</div>
                <div>આપના સામાનની જવાબદારી આપની પોતાની રહેશે.</div>
                <div class="manager-signature">- સંચાલક</div>
            </div>
        </div>
    </div>

    <script>
        // Clean, Secure Login Verification
        function handleLogin(event) {
            event.preventDefault();
            
            const userField = document.getElementById("username").value;
            const passField = document.getElementById("password").value;
            const errorDiv = document.getElementById("loginError");

            const encodedPassword = btoa(passField);

            if (userField === "arpit" && encodedPassword === "YXJwaXQ=") {
                errorDiv.style.display = "none";
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("appInterface").style.display = "flex";
                setupCurrentDate();
            } else {
                errorDiv.style.display = "block";
            }
        }

        // Sets the current real-time system date on load/login screen success
        function setupCurrentDate() {
            const dateObj = new Date();
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            document.getElementById("slipDate").innerText = `${day}-${month}-${year}`;
        }

        function printInvoice() {
            const boxVal = document.getElementById("boxNumber").value || "-";
            
            // Populating data values dynamically matching table constraints
            document.getElementById("cboxNumber").innerHTML = boxVal;
            document.getElementById("cboxNumberRow").innerHTML = boxVal;
            
            document.getElementById("cmobile").innerHTML = document.getElementById("mobile").value || "-";
            document.getElementById("ccamera").innerHTML = document.getElementById("camera").value || "-";
            document.getElementById("cremoteKey").innerHTML = document.getElementById("remoteKey").value || "-";
            document.getElementById("cpowerBank").innerHTML = document.getElementById("powerBank").value || "-";
            document.getElementById("csmartWatch").innerHTML = document.getElementById("smartWatch").value || "-";
            document.getElementById("cearphone").innerHTML = document.getElementById("earphone").value || "-";
            document.getElementById("cbag").innerHTML = document.getElementById("bag").value || "-";

            window.print();
        }
    </script>
</body>
</html>
