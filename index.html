<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Receipt Slip System...</title>
    <!-- Include SheetJS Library for Excel Operations -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* --- Modern UI Design Variables --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- Login Module Styling --- */
        .login-container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 60px;
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }

        /* --- Main App Layout --- */
        .main-system {
            display: none; 
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 22px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], input[type="number"] {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-print {
            background-color: var(--primary-color);
        }

        .btn-print:hover {
            background-color: var(--primary-hover);
        }

        .btn-export {
            background-color: var(--secondary-color);
        }

        .btn-export:hover {
            background-color: var(--secondary-hover);
        }

        /* --- Live Preview Receipt Structure --- */
        .slip-preview {
            background: #fff;
            padding: 30px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            border: 1px solid #9ca3af;
        }

        .slip-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .slip-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000;
        }

        .slip-table td {
            border: 1px solid #000;
            padding: 4px 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .col-num { width: 5%; text-align: center; }
        .col-label { width: 70%; text-align: left; }
        .col-val { width: 25%; text-align: center; }

        .slip-footer {
            margin-top: 12px;
            font-size: 12px;
            font-family: sans-serif;
            line-height: 1.4;
            font-weight: bold;
        }

        .slip-signature {
            text-align: right;
            margin-top: 2px;
            font-size: 12px;
        }

        /* --- Global Print Layout Rules --- */
        @media print {
            body {
                background: none;
                padding: 0;
                margin: 0;
                display: block;
            }
            .login-container, .container {
                display: none !important;
            }
            .main-system {
                display: block !important;
            }
            .slip-preview {
                border: none;
                padding: 0;
                margin: 0;
                max-width: 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Static Login Module Section -->
    <div class="login-container" id="loginBox">
        <h2>System Sign In</h2>
        <div class="error-message" id="loginError">Invalid username or password.</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" style="background-color: var(--primary-color); width: 100%;">Log In</button>
        </form>
    </div>

    <!-- Main Application UI -->
    <div class="main-system" id="appInterface">
        <div class="container">
            <h2>Checklist Entry Form</h2>
            <form id="invoiceForm">
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="srNo">Sr. No.</label>
                        <input type="text" id="srNo" placeholder="e.g., 558" value="558">
                    </div>
                    <div class="form-group">
                        <label for="boxNumber">Box Number</label>
                        <input type="text" id="boxNumber" placeholder="Value" value="1">
                    </div>
                </div>
                
                <div class="form-row-group">
                    <div class="form-group">
                        <label for="mobile">Mobile</label>
                        <input type="text" id="mobile" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="camera">Camera</label>
                        <input type="text" id="camera" placeholder="Value" value="1">
                    </div>
                </div>

                <div class="form-row-group">
                    <div class="form-group">
                        <label for="remoteKey">Remote Key</label>
                        <input type="text" id="remoteKey" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="powerBank">Power Bank</label>
                        <input type="text" id="powerBank" placeholder="Value" value="1">
                    </div>
                </div>

                <div class="form-row-group">
                    <div class="form-group">
                        <label for="smartWatch">Digital/Smart Watch</label>
                        <input type="text" id="smartWatch" placeholder="Value" value="1">
                    </div>
                    <div class="form-group">
                        <label for="earphone">Bluetooth/Earphone</label>
                        <input type="text" id="earphone" placeholder="Value" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bag">Bag</label>
                    <input type="text" id="bag" placeholder="Value" value="1">
                </div>

                <div class="button-group">
                    <button type="button" class="btn-print" onclick="printInvoice()">Print Slip</button>
                    <button type="button" class="btn-export" onclick="exportToExcel()">Save & Export</button>
                </div>
            </form>
        </div>

        <!-- Document Table Slip View -->
        <div class="slip-preview" id="printableSlip">
            <div class="slip-meta">
                <div>Sr. No. - <span id="pSrNo">558</span></div>
                <div><span id="pDate">05-07-2026</span></div>
            </div>
            
            <table class="slip-table">
                <tr>
                    <td class="col-num">1</td>
                    <td class="col-label">Mobile :</td>
                    <td class="col-val" id="pMobile">-</td>
                </tr>
                <tr>
                    <td class="col-num">2</td>
                    <td class="col-label">Camera :</td>
                    <td class="col-val" id="pCamera">-</td>
                </tr>
                <tr>
                    <td class="col-num">3</td>
                    <td class="col-label">Remote key :</td>
                    <td class="col-val" id="pRemoteKey">-</td>
                </tr>
                <tr>
                    <td class="col-num">4</td>
                    <td class="col-label">Power bank :</td>
                    <td class="col-val" id="pPowerBank">-</td>
                </tr>
                <tr>
                    <td class="col-num">5</td>
                    <td class="col-label">Digital watch - smart watch :</td>
                    <td class="col-val" id="pSmartWatch">-</td>
                </tr>
                <tr>
                    <td class="col-num">6</td>
                    <td class="col-label">Bluetooth - earphone :</td>
                    <td class="col-val" id="pEarphone">-</td>
                </tr>
                <tr>
                    <td class="col-num">7</td>
                    <td class="col-label">Bag :</td>
                    <td class="col-val" id="pBag">-</td>
                </tr>
                <tr>
                    <td class="col-num">8</td>
                    <td class="col-label">Box Number :</td>
                    <td class="col-val" id="pBoxNumber">-</td>
                </tr>
            </table>

            <div class="slip-footer">
                સૂચના :<br>
                આપના સામાનની જવાબદારી<br>
                આપની પોતાની રહેશે.
            </div>
            <div class="slip-signature">- સંચાલક</div>
        </div>
    </div>

    <script>
        // Array to dynamically hold Excel records during the current session
        let excelDataLog = [];

        // Setup current system date formatting cleanly on screen initialization
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            document.getElementById("pDate").innerText = `${dd}-${mm}-${yyyy}`;
        });

        // Safe Base64 Login Evaluation Process
        function handleLogin(event) {
            event.preventDefault();
            
            const userField = document.getElementById("username").value;
            const passField = document.getElementById("password").value;
            const errorDiv = document.getElementById("loginError");

            // Base64 encoding for "arpit"
            const encodedPassword = btoa(passField);

            if (userField === "arpit" && encodedPassword === "YXJwaXQ=") {
                errorDiv.style.display = "none";
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("appInterface").style.display = "flex";
            } else {
                errorDiv.style.display = "block";
            }
        }

        // Output table rendering, data extraction, and auto-logging to memory
        function printInvoice() {
            const currentDate = document.getElementById("pDate").innerText;
            const srNo = document.getElementById("srNo").value || "-";
            const boxNumber = document.getElementById("boxNumber").value || "-";
            const mobile = document.getElementById("mobile").value || "-";
            const camera = document.getElementById("camera").value || "-";
            const remoteKey = document.getElementById("remoteKey").value || "-";
            const powerBank = document.getElementById("powerBank").value || "-";
            const smartWatch = document.getElementById("smartWatch").value || "-";
            const earphone = document.getElementById("earphone").value || "-";
            const bag = document.getElementById("bag").value || "-";

            // Update UI Preview
            document.getElementById("pSrNo").innerHTML = srNo;
            document.getElementById("pMobile").innerHTML = mobile;
            document.getElementById("pCamera").innerHTML = camera;
            document.getElementById("pRemoteKey").innerHTML = remoteKey;
            document.getElementById("pPowerBank").innerHTML = powerBank;
            document.getElementById("pSmartWatch").innerHTML = smartWatch;
            document.getElementById("pEarphone").innerHTML = earphone;
            document.getElementById("pBag").innerHTML = bag;
            document.getElementById("pBoxNumber").innerHTML = boxNumber;

            // Automatically record this item row into the Excel dataset array
            excelDataLog.push({
                "Date": currentDate,
                "Sr. No.": srNo,
                "Box Number": boxNumber,
                "Mobile": mobile,
                "Camera": camera,
                "Remote Key": remoteKey,
                "Power Bank": powerBank,
                "Digital/Smart Watch": smartWatch,
                "Bluetooth/Earphone": earphone,
                "Bag": bag
            });

            // Trigger targeted window printing
            window.print();

            // Auto-increment the Serial Number for the next token entry
            if(!isNaN(srNo)) {
                document.getElementById("srNo").value = parseInt(srNo) + 1;
            }
        }

        // Function to export collected rows into an external physical Excel sheet file
        function exportToExcel() {
            if (excelDataLog.length === 0) {
                alert("No slip data recorded yet! Please print some slips before exporting.");
                return;
            }

            // Create a new Excel workbook instance object
            const workbook = XLSX.utils.book_new();
            
            // Convert our flat memory JSON array to a spreadsheet grid sheet
            const worksheet = XLSX.utils.json_to_sheet(excelDataLog);
            
            // Append Worksheet to Workbook structure configuration
            XLSX.utils.book_append_sheet(workbook, worksheet, "Receipt Logs");
            
            // Construct filename dynamically with timestamp context
            const dateStr = new Date().toISOString().slice(0,10);
            const fileName = `Receipt_Data_Log_${dateStr}.xlsx`;
            
            // Generate raw file stream data bytes and trigger standard browser save prompt
            XLSX.writeFile(workbook, fileName);
        }
    </script>
</body>
</html>
